name: StoryBook Depoly

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}

    steps:
      - name: Validate deployment secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail

          test -n "${DEPLOY_HOST}" || (echo "DEPLOY_HOST is not configured" >&2; exit 1)
          test -n "${DEPLOY_USER}" || (echo "DEPLOY_USER is not configured" >&2; exit 1)
          test -n "${DEPLOY_SSH_KEY}" || (echo "DEPLOY_SSH_KEY is not configured" >&2; exit 1)
          test -n "${DEPLOY_PATH}" || (echo "DEPLOY_PATH is not configured" >&2; exit 1)

      - name: Deploy on server over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ env.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail

            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin main
            git reset --hard origin/main
            docker build -t ui-docs:latest .
            docker rm -f ui-docs || true
            docker run -d \
              --name ui-docs \
              --restart unless-stopped \
              -p 127.0.0.1:8080:80 \
              ui-docs:latest
